services:
  backend:
    build:
      context: ./backend
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
      VERIQ_DB_PATH: /data/veriq_mvp.db
      VERIQ_ALLOWED_ORIGINS: ${VERIQ_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - veriq-data:/data
    restart: unless-stopped
    cpus: 1.0
    mem_limit: 768m

  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_VERIQ_API_URL: ${NEXT_PUBLIC_VERIQ_API_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 512m
    healthcheck:
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))

volumes:
  veriq-data:
